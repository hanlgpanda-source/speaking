<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Phát Âm Tiếng Anh 9 - Unit 3</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        h2 { color: #7f8c8d; font-size: 16px; margin-top: 0; margin-bottom: 25px; }
        
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #7f8c8d;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #3498db;
            border-bottom: 3px solid #3498db;
        }

        .status {
            color: #95a5a6;
            font-style: italic;
            margin-bottom: 15px;
            min-height: 20px;
        }
        .sentence-box {
            background-color: #f8fafc;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 6px solid #3498db;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .en-text { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 8px; }
        .ipa-text { font-size: 16px; color: #e74c3c; font-style: italic; margin-bottom: 5px; }
        .vi-text { font-size: 16px; color: #64748b; }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        button.main-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }
        button.main-btn:hover { background-color: #27ae60; }
        button.main-btn:disabled { background-color: #cbd5e1; cursor: not-allowed; box-shadow: none; }
        
        .nav-btn {
            background-color: #475569;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .nav-btn:hover { background-color: #334155; }
        .nav-btn:disabled { background-color: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

        .result-box { text-align: left; background: #f8fafc; padding: 15px; border-radius: 8px; }
        .score { font-size: 45px; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .diff { font-size: 18px; line-height: 1.6; }
        .match { color: #2ecc71; font-weight: bold; }
        .mismatch { color: #e74c3c; font-weight: bold; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="container">
    <h1>Luyện Phát Âm Tiếng Anh 9 (Chuẩn US)</h1>
    <h2>Unit 3: Healthy Living for Teens</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchCategory('vocab')">Từ Vựng</button>
        <button class="tab-btn" onclick="switchCategory('grammar')">Ngữ Pháp</button>
        <button class="tab-btn" onclick="switchCategory('conversation')">Hội Thoại</button>
    </div>

    <div class="status" id="status">Sẵn sàng! Nhấn nút mic và bắt đầu đọc câu bên dưới.</div>

    <div class="sentence-box">
        <div class="en-text" id="enText">Loading...</div>
        <div class="ipa-text" id="ipaText"></div>
        <div class="vi-text" id="viText"></div>
    </div>

    <div class="control-panel">
        <button class="nav-btn" id="btnPrev">⏮ Câu trước</button>
        <button class="main-btn" id="btnSpeak">🎤 Bắt đầu nói</button>
        <button class="nav-btn" id="btnNext">Câu tiếp ⏭</button>
    </div>

    <div class="result-box">
        <div class="score" id="score">-- %</div>
        <div id="diffResult" class="diff"></div>
    </div>
</div>

<script>
    // Dữ liệu trích xuất trực tiếp từ file tài liệu của bạn
    const dataset = {
        vocab: [
            { en: "healthy lifestyle", ipa: "/ˈhelθi ˈlaɪfstaɪl/", vi: "lối sống lành mạnh" },
            { en: "maintain", ipa: "/meɪnˈteɪn/", vi: "duy trì" },
            { en: "balanced diet", ipa: "/ˈbælənst ˈdaɪət/", vi: "chế độ ăn cân bằng" },
            { en: "exercise", ipa: "/ˈeksəsaɪz/", vi: "bài tập; tập thể dục" },
            { en: "stress", ipa: "/stres/", vi: "căng thẳng; gây căng thẳng" },
            { en: "anxiety", ipa: "/æŋˈzaɪəti/", vi: "sự lo lắng, lo âu" },
            { en: "concentrate", ipa: "/ˈɒnsəntreɪt/", vi: "tập trung" }
        ],
        grammar: [
            { en: "If the city is cleaner, people will have a healthier life.", ipa: "Conditional Type 1", vi: "Nếu thành phố sạch hơn, mọi người sẽ có cuộc sống khỏe mạnh hơn." },
            { en: "If she eats too much junk food, she will gain weight.", ipa: "Conditional Type 1", vi: "Nếu cô ấy ăn quá nhiều đồ ăn nhanh, cô ấy sẽ tăng cân." },
            { en: "People should use public transport because it reduces pollution.", ipa: "Should + V", vi: "Mọi người nên sử dụng giao thông công cộng vì nó giảm ô nhiễm." },
            { en: "Teenagers should get enough sleep.", ipa: "Should + V", vi: "Thanh thiếu niên nên ngủ đủ giấc." },
            { en: "You shouldn't stay up late.", ipa: "Shouldn't + V", vi: "Bạn không nên thức khuya." },
            { en: "I like city life because it is convenient.", ipa: "Because (Nguyên nhân)", vi: "Tôi thích cuộc sống thành phố vì nó thuận tiện." },
            { en: "I sleep early, so I feel better in the morning.", ipa: "So (Kết quả)", vi: "Tôi ngủ sớm nên tôi cảm thấy tốt hơn vào buổi sáng." }
        ],
        conversation: [
            { en: "You look a little tired today.", ipa: "Nam", vi: "Hôm nay trông bồ có vẻ hơi mệt mỏi đấy." },
            { en: "Sometimes I feel anxiety, so I can't concentrate on my study.", ipa: "Lan", vi: "Đôi khi mình cảm thấy lo lắng, vì vậy mình không thể tập trung vào việc học." },
            { en: "I think you should have a healthy lifestyle.", ipa: "Nam", vi: "Mình nghĩ bồ nên có một lối sống lành mạnh." },
            { en: "First, you should have a balanced diet.", ipa: "Nam", vi: "Đầu tiên, bồ nên có một chế độ ăn cân bằng." },
            { en: "You should eat more vegetables and fruits, and you shouldn't eat too much fast food.", ipa: "Nam", vi: "Bồ nên ăn nhiều rau quả hơn, và không nên ăn quá nhiều thức ăn nhanh." },
            { en: "If you exercise regularly, you will become healthier.", ipa: "Nam", vi: "Nếu bồ tập thể dục thường xuyên, bồ sẽ trở nên khỏe mạnh hơn." },
            { en: "If people use public transport more often, the city will become cleaner.", ipa: "Nam", vi: "Nếu mọi người sử dụng phương tiện công cộng thường xuyên hơn, thành phố sẽ sạch hơn." }
        ]
    };

    let currentCategory = 'vocab';
    let currentIndex = 0;

    // Cấu hình Web Speech API của Google
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (!SpeechRecognition) {
        alert("Trình duyệt không hỗ trợ nhận diện giọng nói. Hãy mở bằng Google Chrome để học bạn nhé!");
    } else {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Chuẩn giọng Anh - Mỹ
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    }

    const enText = document.getElementById('enText');
    const ipaText = document.getElementById('ipaText');
    const viText = document.getElementById('viText');
    const btnSpeak = document.getElementById('btnSpeak');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const status = document.getElementById('status');
    const scoreDisplay = document.getElementById('score');
    const diffResult = document.getElementById('diffResult');

    function renderScreen() {
        const currentList = dataset[currentCategory];
        const item = currentList[currentIndex];
        
        enText.innerText = item.en;
        ipaText.innerText = item.ipa || "";
        viText.innerText = item.vi;

        scoreDisplay.innerText = "-- %";
        scoreDisplay.style.color = "#2c3e50";
        diffResult.innerHTML = "";
        status.innerText = `[${currentCategory.toUpperCase()}] Câu ${currentIndex + 1} / ${currentList.length}. Sẵn sàng!`;

        btnPrev.disabled = currentIndex === 0;
        btnNext.disabled = currentIndex === currentList.length - 1;
    }

    function switchCategory(cat) {
        currentCategory = cat;
        currentIndex = 0;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderScreen();
    }

    btnPrev.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderScreen(); } });
    btnNext.addEventListener('click', () => { if (currentIndex < dataset[currentCategory].length - 1) { currentIndex++; renderScreen(); } });

    if (recognition) {
        btnSpeak.addEventListener('click', () => {
            recognition.start();
            status.innerText = "🎤 Máy đang nghe... Hãy đọc thật to rõ ràng nhé!";
            btnSpeak.disabled = true;
        });

        recognition.onresult = (event) => {
            const userSpeech = event.results[0][0].transcript;
            status.innerText = "Đang phân tích cách bạn phát âm...";
            calculateScore(dataset[currentCategory][currentIndex].en, userSpeech);
        };

        recognition.onerror = (e) => {
            status.innerText = "Lỗi nhận diện âm thanh: " + e.error;
            btnSpeak.disabled = false;
        };

        recognition.onend = () => { btnSpeak.disabled = false; };
    }

    function calculateScore(target, user) {
        const cleanText = text => text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").split(/\s+/).filter(Boolean);
        
        const targetWords = cleanText(target);
        const userWords = cleanText(user);

        let matchCount = 0;
        let htmlOutput = "<strong>Phân tích từ:</strong> ";

        targetWords.forEach((word) => {
            if (userWords.includes(word)) {
                matchCount++;
                htmlOutput += `<span class="match">${word}</span> `;
            } else {
                htmlOutput += `<span class="mismatch">${word}</span> `;
            }
        });

        const finalScore = Math.round((matchCount / targetWords.length) * 100);
        scoreDisplay.innerText = finalScore + "%";

        if (finalScore >= 80) {
            scoreDisplay.style.color = "#2ecc71";
            status.innerText = "Excellent! Phát âm chuẩn xác xuất sắc.";
        } else if (finalScore >= 50) {
            scoreDisplay.style.color = "#f39c12";
            status.innerText = "Good job! Hãy chú ý sửa lại những từ gạch đỏ.";
        } else {
            scoreDisplay.style.color = "#e74c3c";
            status.innerText = "Hãy cố gắng đọc rõ ràng từng từ màu đỏ lại nha!";
        }

        diffResult.innerHTML = htmlOutput + `<br><br><i>(Hệ thống nhận diện được bạn nói: "${user || '...'}")</i>`;
    }

    // Chạy lần đầu
    renderScreen();
</script>

</body>
</html>
